<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>地下室 · 驯化游戏</title>
    <style>
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: "Microsoft YaHei", sans-serif;
            line-height: 1.8;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }
        .game-box {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            padding: 25px 20px;
            border-radius: 12px;
            border: 1px solid #ff3333;
            box-shadow: 0 0 30px rgba(255, 50, 50, 0.3);
        }
        .title {
            color: #ff4444;
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
        }
        .text {
            font-size: 16px;
            min-height: 200px;
            margin-bottom: 25px;
            white-space: pre-line;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #1a1a1a;
            color: #ddd;
            border: 1px solid #ff4444;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: #ff3333;
            color: #fff;
        }
        .popup {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding:20px;
        }
        .popup.show {
            display: flex;
        }
        .popup-inner {
            background: #111;
            border: 2px solid #ff4444;
            border-radius: 12px;
            max-width: 450px;
            width:100%;
            padding:30px;
            text-align: center;
        }
        .popup-text {
            font-size: 17px;
            color: #ff7777;
            margin-bottom:25px;
            line-height:1.8;
        }
        .popup-close {
            padding:10px 25px;
            background:#ff4444;
            color:#fff;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
        .barrage {
            position: fixed;
            color: #ff5050;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 0 6px #ff0000;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
            animation: barrageMove 6s linear forwards;
        }
        @keyframes barrageMove {
            from { right: -200px; }
            to { right: 120%; }
        }
    </style>
</head>
<body>
    <div class="popup" id="popup">
        <div class="popup-inner">
            <div class="popup-text" id="ptext"></div>
            <button class="popup-close" onclick="closePop()">继续</button>
        </div>
    </div>

    <div class="game-box">
        <div class="title" id="gtitle"></div>
        <div class="text" id="gtext"></div>
        <div id="gbtns"></div>
    </div>

<script>
    let now = "start";
    let tame = 0; // 驯化进度 0-100
    let wait = null;

    function createBarrage(text){
        let div = document.createElement("div");
        div.className = "barrage";
        div.innerText = text;
        div.style.top = Math.random() * 85 + "%";
        document.body.appendChild(div);
        setTimeout(()=>div.remove(),6000);
    }

    function showPop(text){
        document.getElementById("ptext").innerText = text;
        document.getElementById("popup").classList.add("show");
    }
    function closePop(){
        document.getElementById("popup").classList.remove("show");
        if(wait){
            now = wait;
            wait = null;
            load();
        }
    }

    function go(to, pop, barrages, addTame){
        if(addTame) tame = Math.min(100, tame + addTame);
        if(pop){
            wait = to;
            showPop(pop);
        }else{
            now = to;
            load();
        }
        if(barrages){
            barrages.forEach(txt => createBarrage(txt));
        }
    }

    function load(){
        let s = story[now];
        if(!s) return;
        document.getElementById("gtitle").innerText = s.title;
        document.getElementById("gtext").innerText = s.text + (s.diary ? "\n\n" + s.diary : "");
        let box = document.getElementById("gbtns");
        box.innerHTML = "";
        s.btns.forEach(b=>{
            let btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = b.txt;
            btn.onclick = ()=>{go(b.to, b.pop, b.barrages, b.addTame);};
            box.appendChild(btn);
        });
    }
