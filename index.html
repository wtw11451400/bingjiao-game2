<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幽灵</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      background-color: #000;
      color: #fff;
      font-family: "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }
    .container{
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .title{
      font-size: 32px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    .content{
      font-size: 18px;
      line-height: 2;
      margin-bottom: 40px;
      max-width: 600px;
    }
    .btn{
      padding: 12px 30px;
      background-color: #222;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover{
      background-color: #fff;
      color: #000;
    }
    .hide{
      display: none;
    }
  </style>
</head>
<body>
  <div class="container" id="page1">
    <div class="title">你来了</div>
    <div class="content">
      我等了你很久<br>
      久到我都快忘了时间<br>
      你还记得我吗
    </div>
    <button class="btn" onclick="goPage(2)">记得</button>
    <button class="btn" onclick="goPage(3)">不记得</button>
  </div>

  <div class="container hide" id="page2">
    <div class="title">真好</div>
    <div class="content">
      你还记得我<br>
      那你愿意<br>
      留下来陪我吗
    </div>
    <button class="btn" onclick="goPage(4)">愿意</button>
    <button class="btn" onclick="goPage(5)">不愿意</button>
  </div>

  <div class="container hide" id="page3">
    <div class="title">没关系</div>
    <div class="content">
      就算你不记得我<br>
      我也会<br>
      一直陪着你
    </div>
    <button class="btn" onclick="goPage(4)">留下来</button>
    <button class="btn" onclick="goPage(5)">离开</button>
  </div>

  <div class="container hide" id="page4">
    <div class="title">永远</div>
    <div class="content">
      我们会永远在一起<br>
      再也不分开
    </div>
    <button class="btn" onclick="reset()">重新开始</button>
  </div>

  <div class="container hide" id="page5">
    <div class="title">别走</div>
    <div class="content">
      别走<br>
      留下来<br>
      陪我
    </div>
    <button class="btn" onclick="reset()">回来</button>
  </div>

  <script>
    function goPage(num){
      document.querySelectorAll('.container').forEach(item=>{
        item.classList.add('hide');
      });
      document.getElementById('page'+num).classList.remove('hide');
    }
    function reset(){
      document.querySelectorAll('.container').forEach(item=>{
        item.classList.add('hide');
      });
      document.getElementById('page1').classList.remove('hide');
    }
  </script>
</body>
</html>
