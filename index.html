<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幽灵</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      background: linear-gradient(#000, #111);
      color: #fff;
      font-family: "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      animation: bgBreath 4s infinite alternate;
    }
    @keyframes bgBreath {
      0% { background: #000; }
      100% { background: #0a0a0a; }
    }
    .container{
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s ease;
    }
    .container.show{
      opacity: 1;
      transform: translateY(0);
    }
    .title{
      font-size: 34px;
      margin-bottom: 30px;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(255,255,255,0.4);
      opacity: 0;
      transform: translateY(-10px);
      transition: 0.6s ease;
    }
    .content{
      font-size: 19px;
      line-height: 2.2;
      margin-bottom: 45px;
      max-width: 620px;
      opacity: 0;
      transition: 0.8s ease;
    }
    .btn{
      padding: 14px 34px;
      background-color: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 8px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }
    .btn:hover{
      background-color: #fff;
      color: #000;
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
    }
    .btn:active{
      transform: scale(0.95);
    }
    .hide{
      display: none !important;
    }
    .shake{
      animation: shake 0.2s 2;
    }
    @keyframes shake {
      0%{ transform: translateX(0); }
      25%{ transform: translateX(-4px); }
      75%{ transform: translateX(4px); }
      100%{ transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="container" id="page1">
    <div class="title">你来了</div>
    <div class="content">
      我等了你很久<br>
      久到我都快忘了时间<br>
      你还记得我吗
    </div>
    <button class="btn" onclick="goPage(2)">记得</button>
    <button class="btn" onclick="goPage(3)">不记得</button>
  </div>

  <div class="container hide" id="page2">
    <div class="title">真好</div>
    <div class="content">
      你还记得我<br>
      那你愿意<br>
      留下来陪我吗
    </div>
    <button class="btn" onclick="goPage(4)">愿意</button>
    <button class="btn" onclick="goPage(5)">不愿意</button>
  </div>

  <div class="container hide" id="page3">
    <div class="title">没关系</div>
    <div class="content">
      就算你不记得我<br>
      我也会<br>
      一直陪着你
    </div>
    <button class="btn" onclick="goPage(4)">留下来</button>
    <button class="btn" onclick="goPage(5)">离开</button>
  </div>

  <div class="container hide" id="page4">
    <div class="title">永远</div>
    <div class="content">
      我们会永远在一起<br>
      再也不分开
    </div>
    <button class="btn" onclick="reset()">重新开始</button>
  </div>

  <div class="container hide" id="page5">
    <div class="title">别走</div>
    <div class="content">
      别走<br>
      留下来<br>
      陪我
    </div>
    <button class="btn" onclick="reset()">回来</button>
  </div>

  <script>
    let current = 1;
    showPage(1);

    function showPage(num){
      let all = document.querySelectorAll('.container');
      all.forEach(i=>{
        i.classList.remove('show','hide');
        i.classList.add('hide');
      });
      let page = document.getElementById('page'+num);
      page.classList.remove('hide');
      setTimeout(()=>{
        page.classList.add('show');
        let t = page.querySelector('.title');
        let c = page.querySelector('.content');
        setTimeout(()=>{ t.style.opacity=1; t.style.transform='translateY(0)'; },300);
        setTimeout(()=>{ c.style.opacity=1; },600);
      },100);
      current = num;
    }

    function goPage(num){
      document.body.classList.add('shake');
      setTimeout(()=>{
        document.body.classList.remove('shake');
      },200);
      setTimeout(()=>{
        showPage(num);
      },250);
    }

    function reset(){
      goPage(1);
    }
  </script>
</body>
</html>
